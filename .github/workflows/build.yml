name: Build & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglfw3-dev libgl1-mesa-dev cppcheck
    
    - name: Static Analysis (cppcheck)
      run: cppcheck --enable=all *.c *.h --suppress=missingIncludeSystem
      continue-on-error: true
    
    - name: Compile
      run: |
        gcc -Wall -Wextra -Werror main.c window.c shader.c mesh.c renderer.c orbital.c glad/src/gl.c \
        -Iglad/include -o main -L. -lglfw3 -lopengl32 -lm
    
    - name: Check if executable created
      run: |
        if [ -f main ]; then
          echo "✅ Build successful!"
          file main
        else
          echo "❌ Build failed"
          exit 1
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: atom-visualizer-linux
        path: main
